<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiLNK — Coming Soon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060a14;
    color: #e0e8ff;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated star field background */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    animation: twinkle var(--duration) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.8; }
  }

  /* Grid lines */
  .grid {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(29,78,216,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(29,78,216,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
    pointer-events: none;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Logo */
  .logo-wrap {
    position: relative;
    margin-bottom: 32px;
  }

  /* Radar animations */
  @keyframes sweep {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes blip {
    0%, 100% { opacity: 0; r: 4; }
    40%, 60% { opacity: 1; r: 4; }
  }
  @keyframes blip-ring {
    0% { r: 4; opacity: 0.8; }
    100% { r: 28; opacity: 0; }
  }
  @keyframes blip2 {
    0%, 100% { opacity: 0; }
    55%, 75% { opacity: 0.5; }
  }
  @keyframes outer-pulse {
    0%, 100% { stroke-opacity: 1; }
    50% { stroke-opacity: 0.5; }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink-cursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes scan-line {
    0% { top: 0%; }
    100% { top: 100%; }
  }

  /* Wordmark */
  .wordmark {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    color: #e8f0ff;
    letter-spacing: 0.2em;
    text-align: center;
    animation: fadeInDown 1s ease 0.3s both;
    text-shadow: 0 0 40px rgba(59,130,246,0.3);
    margin-bottom: 8px;
  }

  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.55rem, 2vw, 0.75rem);
    letter-spacing: 0.4em;
    color: #1d4ed8;
    text-transform: uppercase;
    text-align: center;
    animation: fadeInDown 1s ease 0.5s both;
    margin-bottom: 56px;
  }

  /* Coming soon text */
  .coming-soon {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.7rem, 3vw, 1rem);
    font-weight: 600;
    letter-spacing: 0.5em;
    color: #3b82f6;
    text-transform: uppercase;
    text-align: center;
    animation: fadeInUp 1s ease 1.5s both;
    position: relative;
    padding: 0 20px;
  }

  .coming-soon::before,
  .coming-soon::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40px;
    height: 1px;
    background: #1d4ed8;
    opacity: 0.5;
  }
  .coming-soon::before { right: 100%; margin-right: -16px; }
  .coming-soon::after { left: 100%; margin-left: -16px; }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #3b82f6;
    margin-left: 4px;
    vertical-align: middle;
    animation: blink-cursor 1s step-end infinite;
  }

  /* Scan line effect */
  .scanline {
    position: fixed;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.15), transparent);
    animation: scan-line 8s linear infinite;
    pointer-events: none;
    z-index: 2;
  }

  /* Bottom domain */
  .domain {
    position: fixed;
    bottom: 24px;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: #1a2a4a;
    animation: fadeInUp 1s ease 2s both;
  }

  /* Decorative corner brackets */
  .bracket {
    position: fixed;
    width: 40px;
    height: 40px;
    opacity: 0.3;
  }
  .bracket-tl { top: 20px; left: 20px; border-top: 1px solid #3b82f6; border-left: 1px solid #3b82f6; }
  .bracket-tr { top: 20px; right: 20px; border-top: 1px solid #3b82f6; border-right: 1px solid #3b82f6; }
  .bracket-bl { bottom: 20px; left: 20px; border-bottom: 1px solid #3b82f6; border-left: 1px solid #3b82f6; }
  .bracket-br { bottom: 20px; right: 20px; border-bottom: 1px solid #3b82f6; border-right: 1px solid #3b82f6; }
</style>
</head>
<body>

<!-- Background effects -->
<div class="grid"></div>
<div class="scanline"></div>
<div class="stars" id="stars"></div>

<!-- Corner brackets -->
<div class="bracket bracket-tl"></div>
<div class="bracket bracket-tr"></div>
<div class="bracket bracket-bl"></div>
<div class="bracket bracket-br"></div>

<div class="content">

  <!-- Wordmark -->
  <div class="wordmark">PiLNK</div>
  <div class="tagline">ADS-B · SDR · ATC · Linked</div>

  <!-- Animated Radar Logo -->
  <div class="logo-wrap">
    <svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1e3a6e" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#060a14" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
        </radialGradient>
        <clipPath id="radarClip">
          <circle cx="140" cy="140" r="110"/>
        </clipPath>
      </defs>

      <!-- Bg glow -->
      <circle cx="140" cy="140" r="130" fill="url(#bgGlow)"/>

      <!-- Radar rings -->
      <circle cx="140" cy="140" r="110" fill="none" stroke="#0f2040" stroke-width="1"/>
      <circle cx="140" cy="140" r="77" fill="none" stroke="#0f2040" stroke-width="1"/>
      <circle cx="140" cy="140" r="44" fill="none" stroke="#0f2040" stroke-width="1"/>

      <!-- Crosshairs -->
      <line x1="140" y1="30" x2="140" y2="250" stroke="#0f2040" stroke-width="1"/>
      <line x1="30" y1="140" x2="250" y2="140" stroke="#0f2040" stroke-width="1"/>

      <!-- Diagonal guides -->
      <line x1="62" y1="62" x2="218" y2="218" stroke="#0a1830" stroke-width="0.75"/>
      <line x1="218" y1="62" x2="62" y2="218" stroke="#0a1830" stroke-width="0.75"/>

      <!-- Sweep -->
      <g clip-path="url(#radarClip)" style="transform-origin:140px 140px; animation: sweep 5s linear infinite;">
        <path d="M140,140 L250,140 A110,110 0 0,0 140,30 Z" fill="url(#sweepGrad)"/>
        <line x1="140" y1="140" x2="250" y2="140" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
      </g>

      <!-- Blip 1 — main -->
      <circle cx="192" cy="88" r="4" fill="#60a5fa" style="animation: blip 5s ease-in-out infinite 0s;"/>
      <circle cx="192" cy="88" r="4" fill="none" stroke="#60a5fa" stroke-width="1" style="animation: blip-ring 5s ease-out infinite 0s;"/>

      <!-- Blip 2 — secondary -->
      <circle cx="168" cy="115" r="3" fill="#93c5fd" style="animation: blip2 5s ease-in-out infinite 1.8s;"/>

      <!-- Tick marks -->
      <g stroke="#1a3a5a" stroke-width="1">
        <line x1="140" y1="30" x2="140" y2="40"/>
        <line x1="250" y1="140" x2="240" y2="140"/>
        <line x1="140" y1="250" x2="140" y2="240"/>
        <line x1="30" y1="140" x2="40" y2="140"/>
        <line x1="218" y1="62" x2="211" y2="69"/>
        <line x1="218" y1="218" x2="211" y2="211"/>
        <line x1="62" y1="218" x2="69" y2="211"/>
        <line x1="62" y1="62" x2="69" y2="69"/>
      </g>

      <!-- Outer ring -->
      <circle cx="140" cy="140" r="110" fill="none" stroke="#1d4ed8" stroke-width="1.5" style="animation: outer-pulse 3s ease-in-out infinite;"/>
    </svg>
  </div>

  <!-- Coming Soon -->
  <div class="coming-soon">Coming Soon<span class="cursor"></span></div>

</div>

<!-- Domain -->
<div class="domain">pilnk.io</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 0.5;
    star.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      top: ${Math.random() * 100}%;
      left: ${Math.random() * 100}%;
      --duration: ${Math.random() * 4 + 2}s;
      animation-delay: ${Math.random() * 4}s;
    `;
    starsEl.appendChild(star);
  }
</script>

</body>
</html>
